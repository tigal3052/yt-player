<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100%; height: 100%; overflow: hidden; }
    #player { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>
  <div id="player"></div>
  <script>
    var videoId = new URL(window.location.href).searchParams.get('videoId') || '';

    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    var player;
    // PiP 중 재생 유지 플래그. 네이티브가 play탭 시 true, pause탭 시 false로 설정.
    window._pipShouldPlay = false;
    // onStateChange에서 재호출 무한루프 방지용 쿨다운
    var _pipPlayRetryAt = 0;
    // 방법11: state=3 감지 후 지연 재시도 타이머
    var _pipPlayRetryTimer = null;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        videoId: videoId,
        playerVars: {
          playsinline: 1,
          controls: 0,
          modestbranding: 1,
          rel: 0,
          fs: 0,
          autoplay: 1,
        },
        events: {
          onReady: function() {
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'ready' }));
          },
          onStateChange: function(e) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'stateChange', state: e.data }));
            if (window._pipShouldPlay === true) {
              var now = Date.now();
              if (e.data === 1) {
                // 재생 성공 → 예약된 재시도 타이머 취소
                if (_pipPlayRetryTimer) { clearTimeout(_pipPlayRetryTimer); _pipPlayRetryTimer = null; }
              } else if (e.data === 2) {
                // 방법9: state=2(일시정지) → 즉시 재호출
                if (now - _pipPlayRetryAt > 500) {
                  _pipPlayRetryAt = now;
                  player.playVideo();
                }
              } else if (e.data === 3) {
                // 방법11: state=3(버퍼링) → 1500ms 후 재시도
                if (!_pipPlayRetryTimer && now - _pipPlayRetryAt > 1000) {
                  _pipPlayRetryTimer = setTimeout(function() {
                    _pipPlayRetryTimer = null;
                    if (window._pipShouldPlay === true) {
                      _pipPlayRetryAt = Date.now();
                      player.playVideo();
                    }
                  }, 1500);
                }
              }
            }
          },
          onError: function(e) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'error', code: e.data }));
          }
        }
      });
    }

    // React Native에서 postMessage로 명령 수신
    function handleCommand(data) {
      try {
        var msg = JSON.parse(data);
        if (!player) return;
        if (msg.cmd === 'play') {
          window._pipShouldPlay = true;
          player.playVideo();
        }
        if (msg.cmd === 'pause') {
          window._pipShouldPlay = false;
          player.pauseVideo();
        }
        if (msg.cmd === 'seekTo') player.seekTo(msg.seconds, true);
        if (msg.cmd === 'loadVideoById') player.loadVideoById({ videoId: msg.videoId });
        if (msg.cmd === 'getTime') {
          var t = player.getCurrentTime();
          window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'currentTime', value: t }));
        }
      } catch(e) {}
    }

    window.addEventListener('message', function(e) { handleCommand(e.data); });
    document.addEventListener('message', function(e) { handleCommand(e.data); });
  </script>
</body>
</html>
