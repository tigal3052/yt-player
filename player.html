<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100%; height: 100%; overflow: hidden; }
    #player { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>
  <div id="player"></div>
  <script>
    var videoId = new URL(window.location.href).searchParams.get('videoId') || '';

    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        videoId: videoId,
        playerVars: {
          playsinline: 1,
          controls: 0,
          modestbranding: 1,
          rel: 0,
          fs: 0,
        },
        events: {
          onReady: function() {
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'ready' }));
          },
          onStateChange: function(e) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'stateChange', state: e.data }));
          },
          onError: function(e) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'error', code: e.data }));
          }
        }
      });
    }

    // React Native에서 postMessage로 명령 수신
    function handleCommand(data) {
      try {
        var msg = JSON.parse(data);
        if (!player) return;
        if (msg.cmd === 'play')   player.playVideo();
        if (msg.cmd === 'pause')  player.pauseVideo();
        if (msg.cmd === 'seekTo') player.seekTo(msg.seconds, true);
        if (msg.cmd === 'getTime') {
          var t = player.getCurrentTime();
          window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'currentTime', value: t }));
        }
      } catch(e) {}
    }

    window.addEventListener('message', function(e) { handleCommand(e.data); });
    document.addEventListener('message', function(e) { handleCommand(e.data); });
  </script>
</body>
</html>
